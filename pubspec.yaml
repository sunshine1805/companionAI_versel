name: companion_ai
description: CompanionAI Mental Health App
publsih_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cached_network_image: ^3.4.0
  
  # HTTP & Network
  http: ^1.1.2
  url_launcher: ^6.2.2

  # Voice Input (NEW)
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1
  
  # UI & Utils
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/